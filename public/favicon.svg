<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Brand green background -->
  <circle cx="16" cy="16" r="16" fill="#1D6B43"/>
  <!-- Outer meridian ring -->
  <circle cx="16" cy="16" r="11.5" fill="none" stroke="#5BE38B" stroke-width="1" opacity="0.55"/>
  <!-- Latitude line -->
  <line x1="4.5" y1="16" x2="27.5" y2="16" stroke="#5BE38B" stroke-width="0.9" opacity="0.45"/>
  <!-- Globe curves (meridians) -->
  <path d="M16 4.5 C11.5 8, 11.5 24, 16 27.5" fill="none" stroke="#5BE38B" stroke-width="0.9" opacity="0.6"/>
  <path d="M16 4.5 C20.5 8, 20.5 24, 16 27.5" fill="none" stroke="#5BE38B" stroke-width="0.9" opacity="0.6"/>
  <!-- Leaf/triangle mark -->
  <path d="M16 8.5 L22 20.5 L10 20.5 Z" fill="#5BE38B" opacity="0.95"/>
  <!-- Inner highlight dot -->
  <circle cx="16" cy="15.5" r="2.5" fill="#fff" opacity="0.25"/>
</svg>
